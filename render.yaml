services:
  - type: web
    name: smc-pro-app
    env: python
    buildCommand: pip install -r requirements.txt && python -m textblob.download_corpora lite
    startCommand: streamlit run smc_pro_app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
